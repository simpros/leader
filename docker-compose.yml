services:
  db:
    image: postgres:18-alpine
    container_name: leader-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: leader
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - leader_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d leader"]
      interval: 10s
      timeout: 5s
      retries: 5

  mail:
    image: axllent/mailpit:latest
    container_name: leader-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  leader_postgres_data:
