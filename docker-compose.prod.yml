# Leader — Production Self-Hosting
#
# Usage:
#   1. Create a .env file with your configuration (see .env.example)
#   2. docker compose -f docker-compose.prod.yml up -d
#
# The web app will be available on port 3000.

services:
  db:
    image: postgres:18-alpine
    container_name: leader-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: leader
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your .env file}
    volumes:
      - leader_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d leader"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ghcr.io/simpros/leader:latest
    container_name: leader-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in your .env file}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in your .env file}
      BETTER_AUTH_BASE_URL: ${BETTER_AUTH_BASE_URL:-http://localhost:3000}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@example.com}
      LEADER_TELEMETRY: ${LEADER_TELEMETRY:-true}
    depends_on:
      db:
        condition: service_healthy

volumes:
  leader_postgres_data:
